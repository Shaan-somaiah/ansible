## Play to install required pacman and AUR packages
---
- name: Install reflector to get fastest pacman mirrors
  community.general.pacman:
    name: reflector
    state: present

## Running reflector takes time and is onl required once to update pacman mirrorlist
- name: Check if reflector has already run
  ansible.builtin.stat:
    path: /var/log/ansibleMarkers/reflectorRun.success
  register: reflector_ran

- name: Update mirrorlist with reflector and create marker file if not already run
  ansible.builtin.shell: |
    reflector --latest 20 --protocol https --sort rate --save /etc/pacman.d/mirrorlist
  args:
    executable: /bin/bash
  when: not reflector_ran.stat.exists

- name: Create dir to place marker file
  ansible.builtin.file:
    path: /var/log/ansibleMarkers
    state: directory
    recurse: yes
    mode: '0700'
  when: not reflector_ran.stat.exists
  
- name: Place marker file if all above succeeds
  ansible.builtin.file:
    path: /var/log/ansibleMarkers/reflectorRun.success
    state: touch
    mode: '0600'
  when: not reflector_ran.stat.exists

- name: Enable multilib repository
  ansible.builtin.replace:
    path: /etc/pacman.conf
    regexp: |
      #\[multilib\]\n#Include = /etc/pacman\.d/mirrorlist
    replace: |
      [multilib]
      Include = /etc/pacman.d/mirrorlist

- name: Update package list
  community.general.pacman:
    update_cache: true
    upgrade: true
  changed_when: false

- name: Download and install required packages
  community.general.pacman:
    name: "{{ item }}"
    state: present
  loop: "{{ my_packages }}"


- name: Enabled installed services
  ansible.builtin.service:
    name: "{{ item }}"
    enabled: true
  loop:
    - bluetooth
    - libvirtd
    - cronie
    - ufw
    - chronyd

- name: Check if VS Code is already installed
  ansible.builtin.stat:
    path: "/opt/vscode/code"
  register: vscode_installed

- name: Wait for DNS resolution
  ansible.builtin.command:
    cmd: nslookup {{ item }}
  register: dns_lookup
  changed_when: false
  retries: 10
  delay: 5
  until: dns_lookup.rc == 0
  loop:
    - "code.visualstudio.com"
    - "github.com"

- name: Download VS Code archive
  ansible.builtin.get_url:
    url: "https://code.visualstudio.com/sha/download?build=stable&os=linux-x64"
    dest: "/tmp/vscode-linux-x64.tar.gz"
    mode: "0644"
  when: not vscode_installed.stat.exists

- name: Create installation directory
  ansible.builtin.file:
    path: "/opt/vscode"
    state: directory
    mode: "0755"
  when: not vscode_installed.stat.exists

- name: Extract VS Code archive
  ansible.builtin.unarchive:
    src: "/tmp/vscode-linux-x64.tar.gz"
    dest: "/opt/vscode"
    remote_src: true
    extra_opts:
      - --strip-components=1
  when: not vscode_installed.stat.exists

- name: Create code symlink
  ansible.builtin.file:
    src: "/opt/vscode/code"
    dest: "/usr/local/bin/code"
    state: link
  when: not vscode_installed.stat.exists

- name: Remove downloaded archive
  ansible.builtin.file:
    path: "/tmp/vscode-linux-x64.tar.gz"
    state: absent
  when: not vscode_installed.stat.exists


- name: Check if wlogout is already installed
  ansible.builtin.shell: command -v wlogout
  register: wlogout_check
  failed_when: false
  changed_when: false

- name: Clone wlogout repository
  ansible.builtin.git:
    repo: https://github.com/ArtsyMacaw/wlogout.git
    dest: /tmp/wlogout
    update: yes
  when: wlogout_check.rc != 0

- name: Configure build directory
  ansible.builtin.command:
    cmd: meson setup build
    chdir: /tmp/wlogout
  when: wlogout_check.rc != 0

- name: Build wlogout
  ansible.builtin.command:
    cmd: ninja -C build
    chdir: /tmp/wlogout
  when: wlogout_check.rc != 0

- name: Install wlogout
  become: true
  ansible.builtin.command:
    cmd: ninja -C build install
    chdir: /tmp/wlogout
  when: wlogout_check.rc != 0
