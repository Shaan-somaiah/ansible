- name: Update apt package repository
  apt:
    update_cache: yes

- name: Install dependencies
  apt:
    name:
      - ca-certificates
      - containerd
      - curl
      - gpg
      - nfs-common
      - conntrack
      - socat
    state: present
    update_cache: yes

- name: Disable ufw
  ufw:
    state: disabled

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Generate default containerd config
  command: containerd config default
  register: containerd_config
  changed_when: false

- name: Write containerd config
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_config.stdout }}"
    mode: "0644"

- name: Enable systemd cgroups in containerd
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Enable containerd
  systemd:
    name: containerd
    state: started
    enabled: yes

- name: Load kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Load kernel modules now
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Apply sysctl params
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl
  command: sysctl --system


# see https://github.com/kubernetes/kubernetes/issues/133098
- name: Create dir for k8s keyring
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Fetch and place k8s keyring
  get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: "0644"

- name: Convert k8s keyring to gpg format
  command: >
    gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    /etc/apt/keyrings/kubernetes-apt-keyring.asc
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add k8s repo
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    content: |
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /

- name: Update apt package repository
  apt:
    update_cache: yes

- name: Install kubeadm, kubelet and kubectl
  apt:
    name:
      - kubeadm
      - kubelet
      - kubectl
    state: present

- name: Hold versions
  command: apt-mark hold kubeadm kubelet kubectl
  changed_when: false

- name: Disable swap
  command: swapoff -a
  when: ansible_facts['swaptotal_mb'] > 0

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^\s*([^#].*\s+swap\s+.*)$'
    replace: '# \1'

- name: Configure kubelet node IP
  copy:
    dest: /etc/default/kubelet
    content: |
      KUBELET_EXTRA_ARGS=--node-ip={{ ansible_facts.default_ipv4.address }}
    mode: "0644"

- name: Restart kubelet
  systemd:
    name: kubelet
    state: restarted

- name: Enable kubelet
  systemd:
    name: kubelet
    enabled: yes

- name: Create directory for nfs mount
  file:
    path: /mnt/kube_vol
    state: directory
    mode: "0755"


- name: Configure NFS mount
  ansible.posix.mount:
    src: nas:/dump/main/kube_vol
    path: /mnt/kube_vol
    fstype: nfs
    opts: defaults,_netdev,nofail
    state: present